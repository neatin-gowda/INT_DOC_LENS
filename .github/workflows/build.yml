name: Build and push to ACR

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image
        run: |
          az acr login --name acrspecdiff
          docker build -t acrspecdiff.azurecr.io/specdiff-api:v1 .
          docker push acrspecdiff.azurecr.io/specdiff-api:v1
